<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Домашние группы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #ffffff;
    --paper-2: #f6f6f6;
    --line: #e3e3e3;
    --line-strong: #cfcfcf;
    --ink: #16181c;
    --ink-2: #3d4147;
    --grey: #85898f;
    --grey-light: #a9adb3;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    overflow: hidden;
  }

  #map { position: absolute; inset: 0; z-index: 1; background: var(--paper); }

  /* Обесцвечиваем тайлы, но оставляем читаемую детализацию */
  .leaflet-tile-pane {
    filter: grayscale(1) contrast(0.78) brightness(1.02);
    opacity: 0.95;
  }

  /* --- Header --- */
  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 16px 44px;
    background: linear-gradient(180deg, #ffffff 42%, #ffffff00 100%);
    pointer-events: none;
  }
  .header h1 {
    font-family: 'Lora', serif;
    font-weight: 600; font-size: 23px;
    margin: 0 0 4px; color: var(--ink);
  }
  .header p {
    font-family: 'Inter', sans-serif;
    margin: 0; font-size: 13px; color: var(--grey);
    line-height: 1.45; max-width: 290px;
  }

  /* ===================================================================
     ТИПОГРАФИКА (единая шкала)
     Lora  — заголовки: шапка, адрес в карточке, заголовок списка, секции,
             подписи населённых пунктов на карте
     Inter — интерфейс: подписи полей, кнопки, текст, контакты
     Капс не используется: подписи идут обычным регистром, серым.
     =================================================================== */

  /* --- Фильтр по районам (только для домашних групп) --- */
  .filter {
    position: absolute; top: 108px; left: 16px; right: 16px; z-index: 10;
    pointer-events: none;
  }
  .filter-label {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px; font-weight: 600;
    color: var(--grey);
    margin-bottom: 8px;
    text-shadow: 0 0 4px #fff, 0 0 4px #fff, 0 0 8px #fff;
  }
  .chips {
    display: flex; gap: 7px; flex-wrap: wrap;
    pointer-events: auto;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    padding: 8px 13px; border-radius: 999px;
    background: var(--paper);
    color: var(--ink-2);
    border: 1px solid var(--line-strong);
    cursor: pointer; white-space: nowrap;
    box-shadow: 0 1px 3px #0000000d;
    transition: background .18s ease, color .18s ease, transform .14s ease, border-color .18s ease;
  }
  .chip-count {
    font-size: 11px; font-weight: 700;
    min-width: 17px; height: 17px; padding: 0 4px;
    border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--paper-2);
    color: var(--grey);
    transition: background .18s ease, color .18s ease;
  }
  .chip.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .chip.active .chip-count {
    background: #ffffff2e; color: #fff;
  }
  .chip:active { transform: scale(.96); }

  /* --- Подписи населённых пунктов --- */
  .place-label {
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--ink-2);
    white-space: nowrap;
    text-shadow:
      0 0 3px #fff, 0 0 3px #fff, 0 0 6px #fff, 0 0 6px #fff;
    pointer-events: none;
  }

  /* --- Marker: домашняя группа --- */
  .home-marker {
    width: 18px; height: 18px; border-radius: 5px;
    background: var(--ink);
    border: 2.5px solid #fff;
    box-shadow: 0 2px 6px #00000038;
    transition: transform .15s ease;
  }
  .home-marker.pulse { animation: pulse 1.7s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 2px 6px #00000038, 0 0 0 0 #16181c33; }
    50%      { box-shadow: 0 2px 6px #00000038, 0 0 0 9px #16181c00; }
  }

  /* --- Marker: церковь (главная точка) --- */
  .church-marker {
    position: relative;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--ink);
    border: 3px solid #fff;
    box-shadow: 0 3px 10px #00000045;
  }
  .church-marker svg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: block;
    width: 14px; height: 14px;
  }

  /* --- Нижняя панель с кнопками --- */
  .bottom-bar {
    position: absolute; left: 16px; right: 16px; bottom: 24px; z-index: 10;
    display: flex; gap: 10px; align-items: center;
    justify-content: space-between;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 9px;
    height: 50px; padding: 0 20px;
    border-radius: 25px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px; font-weight: 600; letter-spacing: .01em;
    cursor: pointer;
    transition: transform .14s ease, box-shadow .2s ease, background .18s ease;
  }
  .btn svg { width: 19px; height: 19px; flex: none; }
  .btn:active { transform: scale(.96); }

  .btn-dark {
    background: var(--ink); color: #fff; border: none;
    box-shadow: 0 4px 16px #00000033, 0 1px 3px #0000001f;
    padding-left: 17px;
  }
  .btn-dark:active { box-shadow: 0 2px 8px #00000033; }
  .btn-dark.loading { opacity: .75; pointer-events: none; }
  .btn-dark.loading svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-light {
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--line-strong);
    box-shadow: 0 2px 10px #0000001a;
  }
  .btn-light:active { background: var(--paper-2); }

  .fab-status {
    position: absolute; right: 16px; bottom: 82px; z-index: 10;
    background: var(--ink); color: #fff;
    font-size: 12px; padding: 6px 11px; border-radius: 8px;
    opacity: 0; transform: translateY(4px);
    transition: opacity .2s ease, transform .2s ease;
    pointer-events: none; max-width: 220px; text-align: right;
  }
  .fab-status.show { opacity: 1; transform: translateY(0); }

  /* --- Bottom sheet --- */
  .sheet-scrim {
    position: absolute; inset: 0; z-index: 15;
    background: #00000000; pointer-events: none;
    transition: background .25s ease;
  }
  .sheet-scrim.open { background: #16181c33; pointer-events: auto; }

  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
    background: var(--paper);
    color: var(--ink);
    border-top: 1px solid var(--line);
    border-radius: 20px 20px 0 0;
    padding: 10px 22px 28px;
    transform: translateY(105%);
    transition: transform .32s cubic-bezier(.2,.9,.25,1);
    box-shadow: 0 -6px 26px #00000024;
    max-height: 64vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 38px; height: 4px; border-radius: 2px;
    background: var(--line-strong); margin: 6px auto 16px;
  }

  .sheet-district {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--grey);
    border: 1px solid var(--line-strong);
    padding: 4px 11px; border-radius: 999px;
    margin-bottom: 12px;
  }

  .sheet h2 {
    font-family: 'Lora', serif;
    font-size: 19px; font-weight: 600;
    margin: 0 0 16px; line-height: 1.35;
  }
  .sheet h2 a {
    color: var(--ink); text-decoration: none;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1px;
  }

  .sheet-row {
    display: flex; gap: 12px;
    padding: 12px 0;
    border-top: 1px solid var(--line);
    font-size: 14.5px; line-height: 1.5;
  }
  .sheet-row .ico {
    flex: none; width: 18px; color: var(--grey-light);
  }
  .sheet-row .label {
    font-family: 'Inter', sans-serif;
    color: var(--grey); font-size: 12px; font-weight: 600;
    display: block; margin-bottom: 3px;
  }
  .sheet-contacts a {
    color: var(--ink); text-decoration: none; display: block;
    padding: 1px 0;
  }
  .sheet-contacts a:active { color: var(--grey); }

  .sheet-note {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--line);
    font-size: 13px; color: var(--grey); line-height: 1.55;
  }

  /* --- Список групп внутри плашки --- */
  .list-title {
    font-family: 'Lora', serif;
    font-size: 19px; font-weight: 600;
    margin: 0 0 4px;
  }
  .list-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--grey);
    margin: 0 0 6px;
  }

  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .list-item:active { opacity: .55; }

  .list-dot {
    flex: none;
    width: 10px; height: 10px; border-radius: 3px;
    background: var(--ink);
    margin-top: 2px;
  }

  /* Церковь в списке — крупнее и с крестом */
  .list-item-church { border-top: none; }
  .list-cross {
    position: relative;
    flex: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--ink);
  }
  .list-cross svg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: block;
    width: 13px; height: 13px;
  }

  .list-section {
    font-family: 'Lora', serif;
    font-size: 15px; font-weight: 600;
    color: var(--ink);
    padding: 18px 0 2px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }

  .list-empty {
    padding: 16px 0 4px;
    font-size: 13.5px; color: var(--grey);
  }

  /* Расписание в карточке церкви — сгруппировано по дням недели */
  .schedule-day-group {
    padding: 9px 0;
    border-top: 1px solid var(--line);
  }
  .schedule-day-group:first-child { border-top: none; padding-top: 0; }
  .schedule-day-label {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px; font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .schedule-event {
    display: flex; gap: 12px;
    padding: 3px 0;
  }
  .schedule-event .schedule-time {
    flex: none; width: 44px;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px; font-weight: 600;
    color: var(--grey-light);
  }
  .schedule-event .schedule-title {
    font-size: 13.5px; color: var(--ink-2); line-height: 1.4;
  }

  .sheet-district-church {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .list-main { flex: 1; min-width: 0; }
  .list-addr {
    font-size: 15px; font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-meta {
    font-size: 12.5px; color: var(--grey);
    line-height: 1.45;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-chevron {
    flex: none; color: var(--grey-light);
    font-size: 18px; line-height: 1;
  }

  /* --- Кнопка "назад к списку" в карточке --- */
  .sheet-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; padding: 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--grey); cursor: pointer;
    margin-bottom: 12px;
  }
  .sheet-back:active { color: var(--ink); }

  .leaflet-control-attribution {
    background: #ffffffcc !important;
    color: var(--grey-light) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--grey) !important; }
  .leaflet-control-zoom { display: none; }
</style>
</head>
<body>

<div id="map"></div>

<div class="header">
  <h1>Интерактивная карта</h1>
  <p>Церковь и домашние группы рядом с тобой — нажми на точку, чтобы узнать подробности.</p>
</div>

<div class="filter">
  <div class="filter-label">Домашние группы</div>
  <div class="chips" id="chips"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-light" id="listBtn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 6H21M8 12H21M8 18H21" stroke="#16181c" stroke-width="2" stroke-linecap="round"/>
      <circle cx="3.5" cy="6" r="1.5" fill="#16181c"/>
      <circle cx="3.5" cy="12" r="1.5" fill="#16181c"/>
      <circle cx="3.5" cy="18" r="1.5" fill="#16181c"/>
    </svg>
    <span>Список</span>
  </button>

  <button class="btn btn-dark" id="locateBtn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="3.2" fill="#ffffff"/>
      <path d="M12 1.8V5M12 19V22.2M1.8 12H5M19 12H22.2" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="7.2" stroke="#ffffff" stroke-width="1.6"/>
    </svg>
    <span>Найти ближайшую</span>
  </button>
</div>
<div class="fab-status" id="fabStatus"></div>

<div class="sheet-scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // ---------------------------------------------------------------------
  // Церковь — главная точка на карте, показывается всегда
  // ---------------------------------------------------------------------
  const CHURCH = {
    name: "Дом Молитвы",
    shortAddress: "ул. Баталинская, 58",
    fullAddress: "ул. Баталинская, 58, пос. Иноземцево",
    lat: 44.094404,
    lon: 43.096362,
    schedule: [
      { day: "Воскресенье", time: "10:00", title: "Церковное Богослужение" },
      { day: "Воскресенье", time: "12:30", title: "Тематический семинар" },
      { day: "Понедельник", time: "19:30", title: "Молитвенные группы" },
      { day: "Четверг", time: "18:00", title: "Молитвенное собрание" },
      { day: "Пятница", time: "19:30", title: "Домашние встречи" },
      { day: "Суббота", time: "15:00", title: "Подростковая встреча" },
      { day: "Суббота", time: "19:00", title: "Молодежное общение" }
    ],
    mapUrl: "https://yandex.ru/maps/-/CTFI4BPK"
  };

  // ---------------------------------------------------------------------
  // Данные домашних групп — правь этот массив, чтобы обновить точки на карте
  // ---------------------------------------------------------------------
  const GROUPS = [
    {
      id: 1,
      district: "Иноземцево",
      shortAddress: "ул. Радонежская, 16",
      fullAddress: "ул. Радонежская, 16, пос. Иноземцево",
      lat: 44.091356,
      lon: 43.102153,
      dayTime: "Пятница, 19:30",
      contacts: [
        { name: "Дмитрий", phone: "+7 928 350-18-99" },
        { name: "Марк", phone: "+7 928 368-75-75" }
      ],
      mapUrl: "https://yandex.ru/maps/-/CTFEzGPw"
    },
    {
      id: 2,
      district: "Пятигорск",
      shortAddress: "ул. Пролетарская, 137А",
      fullAddress: "ул. Пролетарская, 137А, пос. Свободы",
      lat: 44.023405,
      lon: 43.025112,
      dayTime: "Пятница, 19:30",
      contacts: [
        { name: "Александр", phone: "+7 928 911-33-37" },
        { name: "Иван", phone: "+7 903 444-43-68" }
      ],
      mapUrl: "https://yandex.ru/maps/-/CTFEfXI4"
    },
    {
      id: 3,
      district: "Иноземцево",
      shortAddress: "ул. Рядового Панченко, 24",
      fullAddress: "ул. Рядового Панченко, 24, пос. Иноземцево",
      lat: 44.083021,
      lon: 43.121299,
      dayTime: "Пятница, 19:30",
      contacts: [
        { name: "Игорь", phone: "+7 918 774-25-47" },
        { name: "Сергей", phone: "+7 906 411-64-28" }
      ],
      mapUrl: "https://yandex.ru/maps/-/CTFErM5b"
    },
    {
      id: 4,
      district: "Пятигорск",
      shortAddress: "пер. Провальский, 52",
      fullAddress: "пер. Провальский, 52, пос. Горячеводский",
      lat: 44.026160,
      lon: 43.083282,
      dayTime: "Пятница, 19:30",
      contacts: [
        { name: "Роман", phone: "+7 961 490-98-55" },
        { name: "Сергей", phone: "+7 928 630-95-34" }
      ],
      mapUrl: "https://yandex.com/maps?ol=geo&text=Provalskiy%20pereulok,%2052&sll=43.083282,44.026160&sspn=0.005924,0.008210"
    }
  ];

  // ---------------------------------------------------------------------
  // Telegram Mini App init
  // ---------------------------------------------------------------------
  const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
    try { tg.setHeaderColor('#ffffff'); } catch (e) {}
    try { tg.setBackgroundColor('#ffffff'); } catch (e) {}
  }

  // ---------------------------------------------------------------------
  // Карта
  // ---------------------------------------------------------------------
  const map = L.map('map', {
    zoomControl: false,
    attributionControl: true,
    zoomSnap: 0.25  // дробный зум — подгонка под точки становится точнее, без лишнего отдаления
  })
    .setView([44.06, 43.07], 11);

  // Тайлы без подписей (названий улиц и населённых пунктов).
  // Если захочешь вернуть подписи — поменяй light_nolabels на light_all.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '© OpenStreetMap, © CARTO'
  }).addTo(map);

  function makeIcon(pulse) {
    return L.divIcon({
      className: '',
      html: '<div class="home-marker' + (pulse ? ' pulse' : '') + '"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });
  }

  // Подписи населённых пунктов (тайлы идут без текста, поэтому ставим сами)
  const PLACES = [
    { name: 'Иноземцево', lat: 44.1055, lon: 43.1090 },
    { name: 'Пятигорск',  lat: 44.0486, lon: 43.0594 }
  ];

  PLACES.forEach(function (p) {
    L.marker([p.lat, p.lon], {
      interactive: false,
      keyboard: false,
      icon: L.divIcon({
        className: '',
        html: '<div class="place-label">' + p.name + '</div>',
        iconSize: [110, 16],
        iconAnchor: [55, 8]
      })
    }).addTo(map);
  });

  const markers = {};
  GROUPS.forEach(function (g) {
    const marker = L.marker([g.lat, g.lon], { icon: makeIcon(false) }).addTo(map);
    marker.on('click', function () { openSheet(g); });
    markers[g.id] = marker;
  });

  // Маркер церкви — крупнее, круглый, с крестом. Показывается всегда,
  // независимо от выбранного фильтра по районам.
  const churchIcon = L.divIcon({
    className: '',
    html:
      '<div class="church-marker">' +
        '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
          '<path d="M12 2V22M5 9H19" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>' +
        '</svg>' +
      '</div>',
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });

  L.marker([CHURCH.lat, CHURCH.lon], { icon: churchIcon, zIndexOffset: 1000 })
    .addTo(map)
    .on('click', function () { openChurchSheet(); });

  // ---------------------------------------------------------------------
  // Фильтр по району
  // ---------------------------------------------------------------------

  // Логика масштабирования при выборе фильтра:
  // - если точки района разбросаны ШИРЕ 8 км — просто вмещаем их все в кадр;
  // - если компактнее — держим зум в «коридоре» 3–8 км:
  //   не приближаемся ближе, чем радиус 3 км вокруг центра точек.
  const MIN_RADIUS_M = 3000;   // нижний предел приближения (радиус)
  const WIDE_SPREAD_M = 8000;  // если разброс точек шире — показываем всё как есть

  // Текущий выбранный фильтр — его же учитывает список групп
  let currentDistrict = 'all';

  function fitToGroups(list, animate, includeChurch) {
    const points = list.map(function (g) { return [g.lat, g.lon]; });

    // Церковь попадает в кадр только на стартовом виде.
    // При фильтрации по районам она не влияет на масштаб —
    // иначе выбор Пятигорска отдалял бы карту до Иноземцево.
    if (includeChurch) {
      points.push([CHURCH.lat, CHURCH.lon]);
    }

    if (!points.length) return;

    let bounds = L.latLngBounds(points);

    // Оцениваем разброс точек по диагонали охватывающего прямоугольника
    const spread = map.distance(bounds.getNorthWest(), bounds.getSouthEast());

    if (spread <= WIDE_SPREAD_M) {
      // Компактный район: не даём карте приблизиться ближе радиуса 10 км
      bounds.extend(bounds.getCenter().toBounds(MIN_RADIUS_M * 2));
    }
    // Широкий разброс (> 30 км): оставляем bounds как есть — влезут все точки

    const opts = {
      // сверху оставляем место под заголовок и фильтры, снизу — под кнопки,
      // но с минимальным запасом, чтобы кадр был плотным
      paddingTopLeft: [28, 172],
      paddingBottomRight: [28, 82]
    };

    if (animate === false) {
      map.fitBounds(bounds, opts);
    } else {
      opts.duration = 0.6;
      map.flyToBounds(bounds, opts);
    }
  }

  // --- Строим чипы фильтра из данных: районы и количество групп в них ---
  const chipsEl = document.getElementById('chips');

  function buildChips() {
    const districts = [];
    GROUPS.forEach(function (g) {
      if (districts.indexOf(g.district) === -1) districts.push(g.district);
    });
    districts.sort();

    const items = [{ key: 'all', label: 'Все', count: GROUPS.length }];
    districts.forEach(function (d) {
      const count = GROUPS.filter(function (g) { return g.district === d; }).length;
      items.push({ key: d, label: d, count: count });
    });

    chipsEl.innerHTML = items.map(function (it) {
      const active = it.key === currentDistrict ? ' active' : '';
      return (
        '<div class="chip' + active + '" data-district="' + it.key + '">' +
          '<span>' + it.label + '</span>' +
          '<span class="chip-count">' + it.count + '</span>' +
        '</div>'
      );
    }).join('');

    chipsEl.querySelectorAll('.chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        chipsEl.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');

        currentDistrict = chip.dataset.district;
        const visible = visibleGroups();

        GROUPS.forEach(function (g) {
          const show = visible.indexOf(g) !== -1;
          const el = markers[g.id].getElement();
          if (el) el.style.display = show ? '' : 'none';
        });

        closeSheet();
        // Церковь не учитываем — масштабируем строго под группы района
        fitToGroups(visible, true, false);
      });
    });
  }

  buildChips();

  // ---------------------------------------------------------------------
  // Плашка снизу: два режима — список групп и карточка одной группы
  // ---------------------------------------------------------------------
  const sheet = document.getElementById('sheet');
  const scrim = document.getElementById('scrim');
  const sheetContent = document.getElementById('sheetContent');

  // Какие группы сейчас показаны (учитывает выбранный фильтр по району)
  function visibleGroups() {
    return GROUPS.filter(function (g) {
      return currentDistrict === 'all' || g.district === currentDistrict;
    });
  }

  // --- Режим 1: список (церковь + домашние группы) ---
  function openList() {
    const list = visibleGroups();

    const churchItem =
      '<div class="list-item list-item-church" data-church="1">' +
        '<div class="list-cross">' +
          '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
            '<path d="M12 3V21M6 9H18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>' +
          '</svg>' +
        '</div>' +
        '<div class="list-main">' +
          '<div class="list-addr">' + CHURCH.name + ' · ' + CHURCH.shortAddress + '</div>' +
          '<div class="list-meta">Воскресенье, 10:00 — Богослужение</div>' +
        '</div>' +
        '<div class="list-chevron">›</div>' +
      '</div>';

    const groupsHtml = list.length
      ? list.map(function (g) {
          const phones = g.contacts.map(function (c) { return c.phone; }).join(' · ');
          return (
            '<div class="list-item" data-id="' + g.id + '">' +
              '<div class="list-dot"></div>' +
              '<div class="list-main">' +
                '<div class="list-addr">' + g.shortAddress + '</div>' +
                '<div class="list-meta">' + g.district + ' · ' + phones + '</div>' +
              '</div>' +
              '<div class="list-chevron">›</div>' +
            '</div>'
          );
        }).join('')
      : '<div class="list-empty">В этом районе пока нет домашних групп</div>';

    sheetContent.innerHTML =
      '<h2 class="list-title">Интерактивная карта</h2>' +
      '<p class="list-sub">Нажми, чтобы посмотреть на карте</p>' +
      churchItem +
      '<div class="list-section">Домашние группы</div>' +
      groupsHtml;

    sheetContent.querySelectorAll('.list-item').forEach(function (el) {
      el.addEventListener('click', function () {
        if (el.dataset.church) {
          openChurchSheet(true);
          return;
        }
        const id = parseInt(el.dataset.id, 10);
        const g = GROUPS.find(function (x) { return x.id === id; });
        if (g) openSheet(g, null, true);
      });
    });

    sheet.classList.add('open');
    scrim.classList.add('open');
  }

  // --- Карточка церкви ---
  function openChurchSheet(fromList) {
    const backHtml = fromList
      ? '<button class="sheet-back" id="backToList">‹ К списку</button>'
      : '';

    // Группируем события по дням недели, сохраняя порядок первого появления дня
    const scheduleDays = [];
    CHURCH.schedule.forEach(function (s) {
      let group = scheduleDays.find(function (d) { return d.day === s.day; });
      if (!group) {
        group = { day: s.day, events: [] };
        scheduleDays.push(group);
      }
      group.events.push(s);
    });

    const scheduleHtml = scheduleDays.map(function (group) {
      const eventsHtml = group.events.map(function (s) {
        return (
          '<div class="schedule-event">' +
            '<span class="schedule-time">' + s.time + '</span>' +
            '<span class="schedule-title">' + s.title + '</span>' +
          '</div>'
        );
      }).join('');
      return (
        '<div class="schedule-day-group">' +
          '<div class="schedule-day-label">' + group.day + '</div>' +
          eventsHtml +
        '</div>'
      );
    }).join('');

    sheetContent.innerHTML =
      backHtml +
      '<div class="sheet-district sheet-district-church">Церковь</div>' +
      '<h2><a href="' + CHURCH.mapUrl + '" target="_blank" rel="noopener">' + CHURCH.fullAddress + '</a></h2>' +
      '<div class="sheet-row"><span class="ico">◷</span><div><span class="label">Расписание</span>' + scheduleHtml + '</div></div>' +
      '<div class="sheet-note">Приходи на любое собрание — можно просто прийти и посмотреть, никто не будет ничего требовать.</div>';

    const backBtn = document.getElementById('backToList');
    if (backBtn) backBtn.addEventListener('click', openList);

    sheet.classList.add('open');
    scrim.classList.add('open');
    focusOnGroup(CHURCH);
  }

  // --- Режим 2: карточка конкретной группы ---
  // fromList = true → показываем кнопку "К списку"
  function openSheet(g, distanceKm, fromList) {
    const contactsHtml = g.contacts.map(function (c) {
      const tel = c.phone.replace(/\s/g, '');
      return '<a href="tel:' + tel + '">' + c.name + ' — ' + c.phone + '</a>';
    }).join('');

    const backHtml = fromList
      ? '<button class="sheet-back" id="backToList">‹ К списку</button>'
      : '';

    sheetContent.innerHTML =
      backHtml +
      '<div class="sheet-district">' + g.district + '</div>' +
      '<h2><a href="' + g.mapUrl + '" target="_blank" rel="noopener">' + g.fullAddress + '</a></h2>' +
      '<div class="sheet-row"><span class="ico">◷</span><div><span class="label">Встречи</span>' + g.dayTime + '</div></div>' +
      '<div class="sheet-row sheet-contacts"><span class="ico">☏</span><div><span class="label">Контакты</span>' + contactsHtml + '</div></div>' +
      '<div class="sheet-note">Можно просто прийти и посмотреть — никто не будет ничего требовать. Если сомневаешься, напиши напрямую контактному человеку.</div>';

    const backBtn = document.getElementById('backToList');
    if (backBtn) backBtn.addEventListener('click', openList);

    sheet.classList.add('open');
    scrim.classList.add('open');
    focusOnGroup(g);
  }

  // Центрируем карту так, чтобы точка оказалась в середине ВЕРХНЕЙ половины
  // экрана — иначе её перекрывает выехавшая снизу карточка группы.
  function focusOnGroup(g) {
    const targetZoom = 14;
    const point = map.project([g.lat, g.lon], targetZoom);
    const offsetY = map.getSize().y / 4; // сдвигаем центр вниз на четверть экрана
    const shiftedCenter = map.unproject(point.add([0, offsetY]), targetZoom);
    map.flyTo(shiftedCenter, targetZoom, { duration: 0.5 });
  }

  function closeSheet() {
    sheet.classList.remove('open');
    scrim.classList.remove('open');
  }
  scrim.addEventListener('click', closeSheet);

  document.getElementById('listBtn').addEventListener('click', openList);

  // ---------------------------------------------------------------------
  // Поиск ближайшей группы по геолокации
  // ---------------------------------------------------------------------
  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.pow(Math.sin(dLat / 2), 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.pow(Math.sin(dLon / 2), 2);
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  const fabStatus = document.getElementById('fabStatus');
  function showStatus(text, timeout) {
    fabStatus.textContent = text;
    fabStatus.classList.add('show');
    if (timeout) {
      setTimeout(function () { fabStatus.classList.remove('show'); }, timeout);
    }
  }

  const locateBtn = document.getElementById('locateBtn');

  locateBtn.addEventListener('click', function () {
    if (!navigator.geolocation) {
      showStatus('Геолокация недоступна', 2500);
      return;
    }
    locateBtn.classList.add('loading');
    showStatus('Определяем местоположение…', 0);
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        locateBtn.classList.remove('loading');
        fabStatus.classList.remove('show');
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        let nearest = null;
        let nearestDist = Infinity;
        GROUPS.forEach(function (g) {
          const d = haversineKm(lat, lon, g.lat, g.lon);
          if (d < nearestDist) { nearestDist = d; nearest = g; }
        });
        Object.keys(markers).forEach(function (k) { markers[k].setIcon(makeIcon(false)); });
        if (nearest) {
          markers[nearest.id].setIcon(makeIcon(true));
          openSheet(nearest, nearestDist);
        }
      },
      function () {
        locateBtn.classList.remove('loading');
        showStatus('Не удалось определить локацию', 2500);
      },
      { timeout: 8000 }
    );
  });

  // ---------------------------------------------------------------------
  // Начальный вид — церковь и все группы в кадре (без анимации)
  // ---------------------------------------------------------------------
  fitToGroups(GROUPS, false, true);
</script>
